        // Micro-interactions for the search bar
        const searchInput = document.querySelector('input');

            searchContainer.classList.add('emerald-glow');
            searchContainer.style.borderColor = 'rgba(0, 107, 29, 0.4)';
        });

        searchInput.addEventListener('blur', () => {
            searchContainer.style.borderColor = 'rgba(0, 107, 29, 0.1)';
        });

        // Floating particle effect for atmosphere (vanilla js)
        const canvasContainer = document.querySelector('main');
        for (let i = 0; i < 5; i++) {
            const glow = document.createElement('div');
            glow.className = 'absolute rounded-full pointer-events-none opacity-20 filter blur-[80px]';
            glow.style.width = Math.random() * 300 + 200 + 'px';
            glow.style.height = glow.style.width;
            glow.style.background = i % 2 === 0 ? '#006b1d' : '#42E3B4';
            glow.style.left = Math.random() * 100 + '%';
            glow.style.top = Math.random() * 100 + '%';
            glow.style.transition = 'all 10s ease-in-out';
            canvasContainer.appendChild(glow);
            
            setInterval(() => {
                glow.style.left = Math.random() * 100 + '%';
                glow.style.top = Math.random() * 100 + '%';
            }, 10000);
        }
