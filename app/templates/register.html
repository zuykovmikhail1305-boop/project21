{% extends "base.html" %}

{% block title %}Регистрация — CorpAI Intelligence{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2 text-headline-md font-bold text-primary">
                <span class="material-symbols-outlined text-icon-lg" aria-hidden="true">psychology</span>
                CorpAI
            </a>
            <p class="text-body-sm text-on-surface-variant mt-2">Создайте аккаунт для работы с системой</p>
        </div>

        <!-- Register Form -->
        <div class="spatial-container">
            <form id="register-form" class="space-y-4">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-body-sm font-medium text-on-surface-variant mb-1.5">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                        class="w-full px-4 py-2.5 rounded-sm border border-outline-variant bg-surface/50 focus:border-border-focus focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-150 text-body-md"
                        placeholder="you@company.ru"
                    />
                </div>

                <!-- Username -->
                <div>
                    <label for="username" class="block text-body-sm font-medium text-on-surface-variant mb-1.5">Имя пользователя</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        minlength="2"
                        autocomplete="username"
                        class="w-full px-4 py-2.5 rounded-sm border border-outline-variant bg-surface/50 focus:border-border-focus focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-150 text-body-md"
                        placeholder="Иван Иванов"
                    />
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-body-sm font-medium text-on-surface-variant mb-1.5">Пароль</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        class="w-full px-4 py-2.5 rounded-sm border border-outline-variant bg-surface/50 focus:border-border-focus focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-150 text-body-md"
                        placeholder="Минимум 8 символов"
                    />
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm_password" class="block text-body-sm font-medium text-on-surface-variant mb-1.5">Подтвердите пароль</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        class="w-full px-4 py-2.5 rounded-sm border border-outline-variant bg-surface/50 focus:border-border-focus focus:ring-2 focus:ring-primary/20 outline-none transition-all duration-150 text-body-md"
                        placeholder="Повторите пароль"
                    />
                </div>

                <!-- Error message -->
                <div id="error-message" class="hidden p-3 rounded-lg bg-error-container text-on-error-container text-body-sm" role="alert"></div>

                <!-- Submit -->
                <button
                    type="submit"
                    id="register-btn"
                    class="w-full py-2.5 px-4 bg-primary text-on-primary rounded-lg font-medium text-button hover:bg-primary-hover active:bg-primary-active transition-all duration-150 disabled:opacity-38 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-sm"
                >
                    <span id="btn-text">Зарегистрироваться</span>
                    <span id="btn-spinner" class="hidden">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Login link -->
            <p class="text-center mt-6 text-body-sm text-on-surface-variant">
                Уже есть аккаунт?
                <a href="/login" class="text-primary font-medium hover:underline focus-ring rounded-sm">Войти</a>
            </p>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('register-form');
    const errorDiv = document.getElementById('error-message');
    const btn = document.getElementById('register-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.classList.add('hidden');

        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            showError('Пароли не совпадают');
            return;
        }

        if (password.length < 8) {
            showError('Пароль должен содержать минимум 8 символов');
            return;
        }

        btn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');

        try {
            const response = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    username: document.getElementById('username').value,
                    password: password,
                }),
            });

            if (response.ok) {
                window.location.href = '/login?registered=1';
            } else {
                const data = await response.json();
                showError(data.detail || 'Ошибка регистрации');
            }
        } catch (err) {
            showError('Ошибка соединения с сервером');
        } finally {
            btn.disabled = false;
            btnText.classList.remove('hidden');
            btnSpinner.classList.add('hidden');
        }
    });

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.remove('hidden');
    }
</script>
{% endblock %}
